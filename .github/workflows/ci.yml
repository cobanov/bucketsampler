name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: set up python
        run: uv python install ${{ matrix.python-version }}

      - name: create venv
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: install package and dev deps
        run: uv pip install -e ".[dev]"

      - name: lint
        run: |
          source .venv/bin/activate
          ruff check bucketsampler tests
          ruff format --check bucketsampler tests

      - name: type-check
        run: |
          source .venv/bin/activate
          mypy bucketsampler

      - name: test
        run: |
          source .venv/bin/activate
          pytest --cov=bucketsampler --cov-report=term --cov-report=xml

      - name: upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: build sdist and wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3

      - name: build
        run: uv build

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
